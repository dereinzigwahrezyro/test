<!DOCTYPE html>
<html lang="en">

</head>
<body>

<!-- ENTER -->
<div id="enter">click to enter</div>

<!-- PARTICLES -->
<canvas id="bg"></canvas>

<audio id="music" loop>

</audio>

<!-- MAIN -->
<div id="app" class="hidden">

    <img src="avatar.png" class="avatar">
    <h1>yourname</h1>

    <p class="location">📍 Earth</p>

      <span>💎 GUNS</span>
      <span>🔥 ELITE</span>

    <div class="links">
      <a href="#">Discord</a>

    <div class="views">

</div>

<script src="script.js"></script>
</body>
</html>
